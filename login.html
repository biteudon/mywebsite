<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Login | Score Upgrader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      color: #f5f5f5;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      max-width: 480px;
      width: 100%;
      background: rgba(20, 20, 30, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 40px 32px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,59,59,0.2);
      transition: transform 0.2s;
    }

    h1 {
      font-size: 2.2rem;
      color: #ff3b3b;
      text-align: center;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(255,59,59,0.4);
    }

    .sub {
      text-align: center;
      color: #aaa;
      margin-bottom: 32px;
      font-size: 0.9rem;
      border-bottom: 1px dashed #333;
      padding-bottom: 12px;
    }

    .input-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #ddd;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      background: #1e1e2a;
      border: 1px solid #3a3a4a;
      border-radius: 40px;
      font-size: 1rem;
      color: #f0f0f0;
      transition: all 0.2s;
      outline: none;
      font-family: inherit;
    }

    input:focus {
      border-color: #ff3b3b;
      box-shadow: 0 0 0 3px rgba(255,59,59,0.2);
      background: #252535;
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-pw {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      box-shadow: none;
      font-weight: normal;
    }

    .toggle-pw:hover {
      color: #ff3b3b;
      background: none;
      transform: translateY(-50%) scale(1.05);
    }

    button {
      width: 100%;
      padding: 14px;
      background: #ff3b3b;
      border: none;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
      box-shadow: 0 5px 15px rgba(255,59,59,0.3);
      letter-spacing: 0.8px;
    }

    button:hover {
      background: #e60000;
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(230,0,0,0.4);
    }

    button:active {
      transform: translateY(1px);
    }

    .error-message {
      background: rgba(255,50,50,0.15);
      border-left: 4px solid #ff3b3b;
      padding: 12px 16px;
      border-radius: 20px;
      margin-top: 20px;
      font-size: 0.85rem;
      color: #ff9e9e;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    .demo-cred {
      margin-top: 28px;
      background: #0f0f17;
      border-radius: 28px;
      padding: 15px 20px;
      font-size: 0.8rem;
      text-align: center;
      border: 1px solid #2a2a38;
    }

    .demo-cred p {
      margin-bottom: 8px;
      color: #ffb347;
      font-weight: 600;
    }

    .demo-cred code {
      background: #00000066;
      padding: 4px 10px;
      border-radius: 40px;
      display: inline-block;
      margin: 4px;
      font-family: monospace;
      color: #0f0;
    }

    footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.7rem;
      color: #555;
    }

    @media (max-width: 500px) {
      .login-container {
        padding: 30px 20px;
      }
      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
<div class="login-container">
  <h1>⚡ SCORE UPGRADER ⚡</h1>
  <div class="sub">login to access your 100% journey</div>

  <form id="loginForm" action="#" method="post">
    <div class="input-group">
      <label>👤 USERNAME</label>
      <input type="text" id="username" placeholder="e.g., player_one" autocomplete="username" required>
    </div>
    <div class="input-group">
      <label>🔒 PASSWORD</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" id="togglePw">👁️</button>
      </div>
    </div>
    <button type="submit" id="loginBtn">🔓 LOGIN & UPGRADE</button>
  </form>

  <div id="errorMsg" class="error-message" style="display: none;"></div>

  <div class="demo-cred">
    <p>📋 demo credentials (from users.json)</p>
    <code>player_one / pass123</code>   |  
    <code>scoremaster / master456</code>   |  
    <code>newbie / hello123</code>
    <div style="margin-top: 8px; font-size:0.7rem;">✨ after login → go to score page & upgrade to 100% ✨</div>
  </div>
  <footer>🔥 perfect score awaits 🔥</footer>
</div>

<script>
  // ----- simulated users.json database (same structure as provided) -----
  const USERS_DB = {
    "users": [
      {
        "id": 1,
        "username": "player_one",
        "password": "pass123",      // plain for demo, in real scenario hash would be used
        "score": 85,
        "perfectUpgrades": 3,
        "lastAttempt": "2026-05-10"
      },
      {
        "id": 2,
        "username": "scoremaster",
        "password": "master456",
        "score": 100,
        "perfectUpgrades": 12,
        "lastAttempt": "2026-05-10"
      },
      {
        "id": 3,
        "username": "newbie",
        "password": "hello123",
        "score": 42,
        "perfectUpgrades": 0,
        "lastAttempt": "2026-05-09"
      }
    ]
  };

  // Helper: find user by username & password
  function authenticateUser(username, password) {
    const foundUser = USERS_DB.users.find(user => user.username === username && user.password === password);
    if (foundUser) {
      // return a sanitized copy (exclude password)
      const { password: _, ...safeUser } = foundUser;
      return safeUser;
    }
    return null;
  }

  // show error message
  function showError(msg) {
    const errorDiv = document.getElementById('errorMsg');
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
    // auto hide after 4 seconds
    setTimeout(() => {
      if (errorDiv) errorDiv.style.display = 'none';
    }, 4000);
  }

  function clearError() {
    const errorDiv = document.getElementById('errorMsg');
    errorDiv.style.display = 'none';
    errorDiv.textContent = '';
  }

  // Redirect to main score tool (index.html / the score upgrade page)
  // Since we previously built the score tool as a standalone HTML, we assume it's at "index.html"
  // or the main file. For the sake of this login, we redirect to "score.html" or "index.html"
  // We'll redirect to "index.html" - but also preserve user session via localStorage.
  function onLoginSuccess(user) {
    // Store user session (simple local storage)
    localStorage.setItem('scoreUpgraderUser', JSON.stringify({
      username: user.username,
      id: user.id,
      score: user.score,
      perfectUpgrades: user.perfectUpgrades,
      loggedIn: true,
      loginTime: Date.now()
    }));
    // Optional: store a simple flag
    sessionStorage.setItem('authenticated', 'true');
    // Redirect to main score page (assuming it's named index.html or recreate the previous tool)
    // The previous complete tool code was a full HTML; we can assume it's in same directory as index.html
    window.location.href = 'index.html';
  }

  // handle form submission
  const form = document.getElementById('loginForm');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const toggleBtn = document.getElementById('togglePw');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    clearError();

    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if (!username || !password) {
      showError('❌ Please enter both username and password.');
      return;
    }

    const user = authenticateUser(username, password);
    if (user) {
      // success
      onLoginSuccess(user);
    } else {
      showError('❌ Invalid username or password. Try demo credentials from the box.');
      // Shake effect subtle
      form.style.transform = 'translateX(4px)';
      setTimeout(() => { form.style.transform = ''; }, 100);
      setTimeout(() => { form.style.transform = 'translateX(-2px)'; }, 150);
      setTimeout(() => { form.style.transform = ''; }, 250);
    }
  });

  // Toggle password visibility
  toggleBtn.addEventListener('click', () => {
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    toggleBtn.textContent = type === 'password' ? '👁️' : '🙈';
  });

  // Prefill for demo convenience? not auto-fill for security but user can click
  // Optional: detect if already logged in, redirect to score page
  (function checkExistingSession() {
    const storedUser = localStorage.getItem('scoreUpgraderUser');
    if (storedUser) {
      try {
        const userData = JSON.parse(storedUser);
        if (userData.loggedIn && (Date.now() - userData.loginTime) < 86400000) { // 1 day expiry
          // redirect to main app
          window.location.href = 'index.html';
        } else {
          // session expired, clear
          localStorage.removeItem('scoreUpgraderUser');
          sessionStorage.removeItem('authenticated');
        }
      } catch(e) { /* ignore */ }
    }
  })();

  // Add some micro interaction: placeholder animation
  const inputs = document.querySelectorAll('input');
  inputs.forEach(inp => {
    inp.addEventListener('focus', () => {
      inp.parentElement.parentElement?.classList.add('focused');
    });
    inp.addEventListener('blur', () => {
      inp.parentElement.parentElement?.classList.remove('focused');
    });
  });
</script>
</body>
</html>
